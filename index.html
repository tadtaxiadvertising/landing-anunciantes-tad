            const lastSubmit = localStorage.getItem(STORAGE_KEY);

                    const waitTime = Math.ceil((RATE_LIMIT_MS - elapsed) / 1000);
                    return { allowed: false, waitTime };

                    <HowItWorksSection />
                    <BenefitsSection />
                    <CalculatorSection onCalculate={handleCalculate} />
                    <ContactFormSection calculatedData={calculatedData} />
                    <Footer />
                    <WhatsAppButton />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
